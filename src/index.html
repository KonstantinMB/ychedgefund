<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f0a">
  <meta name="description" content="AI-powered global intelligence dashboard with paper trading capabilities">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Atlas">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Atlas - Global Intelligence Platform</title>
  <link rel="stylesheet" href="/styles/base.css">
</head>
<body>
  <div id="app">
    <!-- Globe/Map Container -->
    <div id="globe-container" class="globe-container"></div>

    <!-- Top Header Bar with Controls -->
    <div class="header-bar">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light theme">
        <span class="theme-icon">🌙</span>
      </button>

      <!-- Paper Trading Toggle -->
      <button id="paper-trading-toggle" class="pt-toggle" aria-label="Toggle paper trading" title="Toggle paper trading auto-execute (Space)">
        <span class="pt-toggle-icon">📈</span>
        <span class="pt-toggle-label">Paper Trading</span>
        <span class="pt-toggle-status" id="pt-toggle-status">AUTO</span>
      </button>

      <div class="header-hint" id="cmd-palette-hint" title="Open command palette (Cmd+K)">⌘K</div>
    </div>

    <!-- Bottom Status Bar: NAV | Daily P&L | Signals | Risk -->
    <div id="status-bar" class="status-bar">
      <div class="status-bar-section" id="sb-nav">
        <span class="sb-label">NAV</span>
        <span class="sb-value" id="sb-nav-value">$1,000,000</span>
      </div>
      <div class="status-bar-divider"></div>
      <div class="status-bar-section" id="sb-pnl">
        <span class="sb-label">Daily P&amp;L</span>
        <span class="sb-value" id="sb-pnl-value">+$0</span>
      </div>
      <div class="status-bar-divider"></div>
      <div class="status-bar-section" id="sb-signals">
        <span class="sb-label">Signals</span>
        <span class="sb-value" id="sb-signals-value">0 active</span>
      </div>
      <div class="status-bar-divider"></div>
      <div class="status-bar-section" id="sb-risk">
        <span class="sb-label">Risk</span>
        <span class="sb-value sb-risk-dot" id="sb-risk-value">● GREEN</span>
      </div>
      <div class="status-bar-divider"></div>
      <div class="status-bar-section sb-shortcuts">
        <span class="sb-hint">T·S·P·Space·Esc</span>
      </div>
    </div>

    <!-- Left Panel: Layer Toggles + Portfolio Management -->
    <div id="left-panel" class="left-panel">
      <!-- Layer toggles rendered by controls.ts -->
      <div id="left-layers-panel"></div>

      <!-- Trading panels (Portfolio, Signals, Performance) -->
      <div class="left-trading-divider">
        <span>PAPER TRADING</span>
      </div>
      <div id="left-trading-panel" class="left-trading-panel"></div>
    </div>

    <!-- Right Panel: Intelligence Panels + resize handle -->
    <div id="right-panel" class="right-panel">
      <div id="right-resize-handle" class="right-resize-handle" title="Drag to resize panel"></div>
      <!-- Intelligence panels rendered here -->
    </div>

    <!-- Command Palette injected by command-palette.ts -->
  </div>
  <script type="module" src="/main.ts"></script>
</body>
</html>
